<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiffView</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --add-bg: rgba(63,185,80,0.15);
    --add-fg: #3fb950;
    --remove-bg: rgba(248,81,73,0.15);
    --remove-fg: #f85149;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  h1 span { color: var(--accent); }
  .editors { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .editor-pane { display: flex; flex-direction: column; }
  .editor-pane label { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  textarea {
    width: 100%; height: 280px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); padding: 12px; font-family: 'SF Mono','Fira Code','Consolas', monospace;
    font-size: 13px; resize: vertical; line-height: 1.5; outline: none; transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  button {
    background: var(--accent); color: #fff; border: none; padding: 8px 20px;
    border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  button.secondary { background: var(--bg2); border: 1px solid var(--border); color: var(--text); }
  button.secondary.active { border-color: var(--accent); color: var(--accent); }
  .stats { font-size: 13px; color: var(--text-muted); margin-left: auto; }
  .stats .added { color: var(--add-fg); font-weight: 600; }
  .stats .removed { color: var(--remove-fg); font-weight: 600; }
  #diff-output {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    overflow: auto; min-height: 200px;
  }
  #diff-output table { width: 100%; border-collapse: collapse; }
  #diff-output td { padding: 1px 10px; white-space: pre-wrap; word-break: break-all; font-family: 'SF Mono','Fira Code','Consolas', monospace; font-size: 13px; }
  #diff-output .line-num { width: 50px; text-align: right; color: #484f58; user-select: none; border-right: 1px solid var(--border); }
  #diff-output .line-add { background: var(--add-bg); }
  #diff-output .line-add .line-content { color: var(--add-fg); }
  #diff-output .line-remove { background: var(--remove-bg); }
  #diff-output .line-remove .line-content { color: var(--remove-fg); }
  #diff-output .line-equal .line-content { color: var(--text-muted); }
  #diff-output .hunk-header { background: #1c2128; color: #79c0ff; padding: 4px 10px; }
  #diff-output .file-header { background: var(--bg2); padding: 10px 16px; font-weight: bold; border-bottom: 1px solid var(--border); }
  #diff-output .prefix { user-select: none; display: inline-block; width: 12px; }
  .empty-state { padding: 60px 20px; text-align: center; color: var(--text-muted); }
  .empty-state p { font-size: 15px; }

  /* Side-by-side mode */
  .side-by-side { display: grid; grid-template-columns: 1fr 1fr; }
  .side-by-side .side { overflow-x: auto; }
  .side-by-side .side table { width: 100%; }
  .side-by-side .side:first-child { border-right: 1px solid var(--border); }
  .side-by-side .side-add { background: var(--add-bg); }
  .side-by-side .side-add td { color: var(--add-fg); }
  .side-by-side .side-remove { background: var(--remove-bg); }
  .side-by-side .side-remove td { color: var(--remove-fg); }
  .side-by-side .side-empty { background: #1c1c1c; }
  .side-by-side .side-equal td.content { color: var(--text-muted); }

  @media (max-width: 768px) {
    .editors { grid-template-columns: 1fr; }
    .side-by-side { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <h1><span>&lt;/&gt;</span> DiffView</h1>
  <div class="editors">
    <div class="editor-pane">
      <label>Original</label>
      <textarea id="old-text" placeholder="Paste original text here..." spellcheck="false"></textarea>
    </div>
    <div class="editor-pane">
      <label>Modified</label>
      <textarea id="new-text" placeholder="Paste modified text here..." spellcheck="false"></textarea>
    </div>
  </div>
  <div class="toolbar">
    <button id="btn-diff" onclick="computeDiff()">Compare</button>
    <button id="btn-unified" class="secondary active" onclick="setMode('unified')">Unified</button>
    <button id="btn-side" class="secondary" onclick="setMode('side')">Side by Side</button>
    <button class="secondary" onclick="clearAll()">Clear</button>
    <div class="stats" id="stats"></div>
  </div>
  <div id="diff-output">
    <div class="empty-state"><p>Paste two texts above and click Compare</p></div>
  </div>
</div>
<script>
  let currentMode = 'unified';
  let lastResult = null;

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('btn-unified').classList.toggle('active', mode === 'unified');
    document.getElementById('btn-side').classList.toggle('active', mode === 'side');
    if (lastResult) renderDiff(lastResult);
  }

  function clearAll() {
    document.getElementById('old-text').value = '';
    document.getElementById('new-text').value = '';
    document.getElementById('diff-output').innerHTML = '<div class="empty-state"><p>Paste two texts above and click Compare</p></div>';
    document.getElementById('stats').textContent = '';
    lastResult = null;
  }

  async function computeDiff() {
    const oldText = document.getElementById('old-text').value;
    const newText = document.getElementById('new-text').value;
    try {
      const res = await fetch('/api/diff', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ oldText, newText, oldName: 'original', newName: 'modified' }),
      });
      const data = await res.json();
      lastResult = data;
      renderDiff(data);
    } catch (e) {
      document.getElementById('diff-output').innerHTML = '<div class="empty-state"><p>Error computing diff</p></div>';
    }
  }

  function renderDiff(data) {
    const stats = data.stats;
    document.getElementById('stats').innerHTML =
      `<span class="added">+${stats.added}</span> / <span class="removed">-${stats.removed}</span>`;

    const changes = data.json[0].changes;
    if (currentMode === 'unified') {
      renderUnified(changes);
    } else {
      renderSideBySide(changes);
    }
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function renderUnified(changes) {
    let html = '<table>';
    for (const c of changes) {
      const cls = c.type === 'add' ? 'line-add' : c.type === 'remove' ? 'line-remove' : 'line-equal';
      const prefix = c.type === 'add' ? '+' : c.type === 'remove' ? '-' : ' ';
      const oldN = c.oldLine ?? '';
      const newN = c.newLine ?? '';
      html += `<tr class="${cls}"><td class="line-num">${oldN}</td><td class="line-num">${newN}</td><td class="line-content"><span class="prefix">${prefix}</span>${esc(c.content)}</td></tr>`;
    }
    html += '</table>';
    document.getElementById('diff-output').innerHTML = html;
  }

  function renderSideBySide(changes) {
    const leftRows = [];
    const rightRows = [];
    const removes = [];
    const adds = [];

    function flush() {
      const max = Math.max(removes.length, adds.length);
      for (let i = 0; i < max; i++) {
        const r = removes[i];
        const a = adds[i];
        leftRows.push(r
          ? `<tr class="side-remove"><td class="line-num">${r.oldLine||''}</td><td class="content">${esc(r.content)}</td></tr>`
          : `<tr class="side-empty"><td class="line-num"></td><td class="content"></td></tr>`);
        rightRows.push(a
          ? `<tr class="side-add"><td class="line-num">${a.newLine||''}</td><td class="content">${esc(a.content)}</td></tr>`
          : `<tr class="side-empty"><td class="line-num"></td><td class="content"></td></tr>`);
      }
      removes.length = 0;
      adds.length = 0;
    }

    for (const c of changes) {
      if (c.type === 'equal') {
        flush();
        leftRows.push(`<tr class="side-equal"><td class="line-num">${c.oldLine||''}</td><td class="content">${esc(c.content)}</td></tr>`);
        rightRows.push(`<tr class="side-equal"><td class="line-num">${c.newLine||''}</td><td class="content">${esc(c.content)}</td></tr>`);
      } else if (c.type === 'remove') {
        removes.push(c);
      } else {
        adds.push(c);
      }
    }
    flush();

    document.getElementById('diff-output').innerHTML =
      `<div class="side-by-side"><div class="side"><table>${leftRows.join('')}</table></div><div class="side"><table>${rightRows.join('')}</table></div></div>`;
  }

  // Auto-diff on input with debounce
  let timer;
  function autoDiff() { clearTimeout(timer); timer = setTimeout(computeDiff, 500); }
  document.getElementById('old-text').addEventListener('input', autoDiff);
  document.getElementById('new-text').addEventListener('input', autoDiff);
</script>
</body>
</html>
